[pytest]
# SPEC-MTT-011: AsyncClient 사용을 위한 pytest-asyncio 설정
# async_mode = auto: 동기 테스트 함수에서도 async fixture를 사용할 수 있음
asyncio_mode = auto

# 테스트 경로
testpaths = tests

# 테스트 파일 패턴
python_files = test_*.py

# 테스트 클래스 패턴
python_classes = Test*

# 테스트 함수 패턴
python_functions = test_*

# 마커
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests
